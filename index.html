<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --border: #e8e8ed;
  --txt: #1d1d1f;
  --sub: #6e6e73;
  --faint: #aeaeb2;
  --acc: #ff6b35;
  --acc-soft: #fff3ee;
  --acc-dark: #e8541a;
  --grn: #34c759;
  --grn-soft: #e9f9ee;
  --blu: #007aff;
  --blu-soft: #e5f1ff;
  --pur: #af52de;
  --pur-soft: #f5eafd;
  --yel: #ff9f0a;
  --red: #ff3b30;
  color-scheme: light;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; padding-bottom: 120px; }
input, select, textarea, button { font-family: inherit; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.4; }
button { -webkit-appearance: none; cursor: pointer; }

/* NAV BAR */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 max(16px, env(safe-area-inset-bottom));
  z-index: 90;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; padding: 4px 0;
}
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: .02em; }

/* TIMER */
#timer-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 16px 20px max(28px, env(safe-area-inset-bottom));
  z-index: 100; display: none;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
}
#timer-bar.active { display: block; }

/* CARDS */
.card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-pad { padding: 16px; }

/* INPUTS */
.inp {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--txt);
  font-size: 15px;
  font-weight: 500;
  padding: 10px 12px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.inp:focus { border-color: var(--acc); }

/* PILL BUTTON */
.pill {
  border-radius: 999px;
  border: none;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 20px;
  transition: opacity .15s, transform .1s;
}
.pill:active { transform: scale(.97); opacity: .85; }
.pill-acc { background: var(--acc); color: #fff; }
.pill-ghost { background: var(--bg); color: var(--sub); border: 1.5px solid var(--border); }

/* FULL BUTTON */
.btn-full {
  width: 100%; padding: 15px; border-radius: 14px; border: none;
  font-size: 15px; font-weight: 700; letter-spacing: .02em;
  transition: opacity .15s, transform .1s;
}
.btn-full:active { transform: scale(.99); opacity: .9; }
.btn-acc { background: var(--acc); color: #fff; }
.btn-grn { background: var(--grn); color: #fff; }

/* FEEL CHIPS */
.feel-btn {
  flex: 1; padding: 5px 2px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: transparent; color: var(--faint);
  font-size: 10px; font-weight: 700;
  transition: all .1s;
}

/* SECTION HEADER */
.sec-head {
  font-size: 11px; font-weight: 700; color: var(--sub);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 10px;
}

/* BADGE */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
}
</style>
</head>

      {area:"Back Row",name:"Seated Cable Row",sets:[{set:1,reps:"5",weight:"21",feel:"Easy"},{set:2,reps:"5",weight:"21",feel:"Easy"},{set:3,reps:"5",weight:"21",feel:"Easy"},{set:4,reps:"5",weight:"28",feel:"Med"},{set:5,reps:"5",weight:"28",feel:"Med"}]},
      {area:"Legs",name:"DB Romanian Deadlift",sets:[{set:1,reps:"5",weight:"15",feel:"Easy"},{set:2,reps:"5",weight:"15",feel:"Easy"},{set:3,reps:"5",weight:"15",feel:"Easy"},{set:4,reps:"5",weight:"20",feel:"Med"},{set:5,reps:"5",weight:"20",feel:"Med"}]}

// ── SUPABASE ────────────────────────────────────────────────────────────────
let _sb=null, _userId=null;
function sbReady() { return _sb&&_userId; }

async function sbInit() {
  try {
    _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (location.hash.includes("access_token")) {
      await _sb.auth.exchangeCodeForSession(location.hash);
      history.replaceState(null,"",location.pathname);
    }
    const { data:{session} } = await _sb.auth.getSession();
    if (session && !session.user.is_anonymous) {
      _userId = session.user.id;
    } else {
      if (session) await _sb.auth.signOut(); // clear anonymous session
      showLoginScreen();
    }
  } catch(e) { console.warn("Supabase init failed:",e); }
}

async function sbLoad() {
  if (!sbReady()) return;
  try {
    const {data,error} = await _sb.from("user_data").select("*").eq("id",_userId).maybeSingle();
    if (error) throw error;
    if (data) {
      S.sessions  = Object.assign({},S.sessions, data.sessions||{});
      S.nutrition = Object.assign({},S.nutrition,data.nutrition||{});
      S.progress  = Object.assign({},S.progress, data.progress||{});
      S.wSets     = Object.assign({},S.wSets,    data.w_sets||{});
      if (data.height) S.height=data.height;
      if (data.weight) S.weight=data.weight;
      if (data.w_nums) S.wNums=data.w_nums;
    }
  } catch(e) { console.warn("Supabase load failed:",e); }
}

async function sbSave() {
  if (!sbReady()) return;
  S.syncStatus="syncing"; renderSyncBadge();
  try {
    const {error} = await _sb.from("user_data").upsert({
      id:_userId, sessions:S.sessions, nutrition:S.nutrition,
      progress:S.progress, w_sets:S.wSets,
      height:S.height, weight:S.weight, w_nums:S.wNums
    });
    if (error) throw error;
    S.syncStatus="synced";
  } catch(e) { console.warn("Supabase save:",e); S.syncStatus="error"; }
  renderSyncBadge();
}

function renderSyncBadge() {
  const el=document.getElementById("sync-badge"); if(!el) return;
  const map={idle:["",""],syncing:["↑","#ff9f0a"],synced:["✓ synced","#34c759"],error:["⚠ offline","#ff3b30"]};
  const [t,c]=map[S.syncStatus]||["",""];
  el.textContent=t; el.style.color=c;
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function fmtShort(d) { return new Date(d+'T00:00:00').toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }

function getWType()  { return S.wManual||getType(S.wDate)||"A"; }
function getSlots()  { return SLOTS[getWType()]; }
function getEx(si)   { const sl=getSlots()[si]; return sl.options[Math.min(S.wSel[si]??0,sl.options.length-1)]; }
function getSets(si) { return S.wSets[S.wDate+"_"+si]||mkSets(getSlots()[si].sets); }

// ── LOGIN SCREEN ─────────────────────────────────────────────────────────────

async function sendMagicLink() {
  const email=document.getElementById("login-email")?.value?.trim();
  if (!email) return;
  const btn=document.getElementById("login-btn");
  const msg=document.getElementById("login-msg");
  btn.textContent="Sending…"; btn.disabled=true; btn.style.opacity=".7";
  const {error} = await _sb.auth.signInWithOtp({

}

// ── TIMER ────────────────────────────────────────────────────────────────────
let timerIv=null;
function showTimer(si,idx) {
  const slots=getSlots(), next=slots[si+1];
  const info=next?"Next up: "+next.area:"Last exercise — great work!";
  clearInterval(timerIv);
  S.timer={visible:true,running:false,seconds:0,total:0,info};
  renderTimer();
}
function presetTimer(s) {
  clearInterval(timerIv);
  S.timer.seconds=s; S.timer.total=s; S.timer.running=true;
  renderTimer();
  timerIv=setInterval(()=>{
    S.timer.seconds--;
    if (S.timer.seconds<=0) {
      S.timer.seconds=0; S.timer.running=false;
      clearInterval(timerIv); onTimerDone();
    }
    renderTimer();
  },1000);
}
function onTimerDone() {
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,660].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=freq;
      const t=ctx.currentTime+i*.45;
      g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
      o.start(t);o.stop(t+.4);
    });
  } catch(e){}
  renderTimer();
}
function skipTimer() {
  clearInterval(timerIv);
  S.timer.visible=false; S.timer.running=false;
  document.getElementById("timer-bar").classList.remove("active");
}
function adjTimer(d) {
  if(!S.timer.running) return;
  S.timer.seconds=Math.max(10,S.timer.seconds+d);
  if(d>0) S.timer.total=Math.max(S.timer.total,S.timer.seconds);
  renderTimer();
}
function fmtTime(s) { return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0"); }

function renderTimer() {
  const bar=document.getElementById("timer-bar");
  if(!S.timer.visible){bar.classList.remove("active");return;}
  bar.classList.add("active");
  const {running,seconds,total,info}=S.timer;
  const done=!running&&total>0&&seconds<=0;
  const R=30,circ=2*Math.PI*R;
  const pct=(running||done)?(total>0?seconds/total:0):0;
  const offset=circ*(1-pct);
  const presets=[{l:"1m",v:60},{l:"1:30",v:90},{l:"2m",v:120},{l:"3m",v:180}];
  let ct,cc;
  if(!running&&total===0){ct="TAP";cc="var(--faint)";}
  else if(done){ct="✓";cc="var(--grn)";}
  else{ct=fmtTime(seconds);cc="var(--txt)";}

  bar.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div>
      <div style="font-size:12px;font-weight:700;color:${done?"var(--grn)":"var(--acc)"};">
        ${done?"Rest Done ✓":"Rest Timer"}
      </div>
      <div style="font-size:12px;color:var(--sub);margin-top:1px;">${info}</div>
    </div>
    <button onclick="skipTimer()" style="background:var(--bg);border:1.5px solid var(--border);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--sub);">Done</button>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div style="position:relative;width:68px;height:68px;flex-shrink:0;">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <circle cx="34" cy="34" r="${R}" fill="none" stroke="var(--border)" stroke-width="5" ${!running&&total===0?'stroke-dasharray="5 4"':""}/>
        ${(running||done)?`<circle cx="34" cy="34" r="${R}" fill="none" stroke="${done?"var(--grn)":"var(--acc)"}" stroke-width="5"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 34 34)"/>`:""}
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
        <span style="font-size:${done?20:(!running&&total===0?11:17)}px;font-weight:800;color:${cc};">${ct}</span>
      </div>
    </div>
    <div style="flex:1;">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;">
        ${presets.map(p=>{
          const sel=running&&S.timer.total===p.v;
          return `<button onclick="presetTimer(${p.v})" style="padding:8px 0;border-radius:10px;border:1.5px solid ${sel?"var(--acc)":"var(--border)"};background:${sel?"var(--acc)":"var(--card)"};color:${sel?"#fff":"var(--sub)"};font-size:12px;font-weight:700;">${p.l}</button>`;
        }).join("")}
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick="adjTimer(-30)" style="flex:1;padding:8px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:${running?"var(--txt)":"var(--faint)"};font-size:13px;font-weight:700;">−30s</button>
        <button onclick="adjTimer(30)"  style="flex:1;padding:8px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:${running?"var(--txt)":"var(--faint)"};font-size:13px;font-weight:700;">+30s</button>
      </div>
    </div>
  </div>`;

    ${S.progress[S.pDate]?`<span class="badge" style="background:var(--grn-soft);color:var(--grn);">✓ Saved</span>`:""}
  </div>

  <!-- Metric inputs -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
    ${metrics.map(f=>`
    <div class="card card-pad">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
        <span style="font-size:16px;">${f.icon}</span>
        <span style="font-size:11px;font-weight:700;color:${f.c};letter-spacing:.04em;">${f.l.toUpperCase()}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:5px;">
        <input id="${f.id}" type="number" value="${f.v}" placeholder="${f.ph}"
          style="flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:22px;font-weight:800;padding:8px 10px;outline:none;min-width:0;"/>
        <span style="font-size:11px;color:var(--sub);white-space:nowrap;">${f.u}</span>
      </div>
    </div>`).join("")}
  </div>

  <!-- Nutrition summary -->
  <div class="card card-pad" style="margin-bottom:12px;">
    <div class="sec-head">Nutrition — From Log</div>
    ${nut?`<div style="display:flex;gap:16px;flex-wrap:wrap;">
      ${[["calories","kcal","var(--acc)"],["protein","g protein","var(--grn)"],["carbs","g carbs","var(--yel)"],["fat","g fat","var(--pur)"]].map(([k,u,c])=>`
      <div>
        <div style="font-size:20px;font-weight:800;color:${c};">${Math.round(nut.totals[k])}</div>
        <div style="font-size:11px;color:var(--sub);">${u}</div>
      </div>`).join("")}
    </div>`:`<div style="font-size:13px;color:var(--faint);">No nutrition logged for this day</div>`}
  </div>

  <!-- Workout feel -->
  <div class="card card-pad" style="margin-bottom:12px;">
    <div class="sec-head">Workout Feel</div>
    ${ses?ses.exercises.map(ex=>{
      const feels=ex.sets.map(s=>s.feel).filter(Boolean);
      const counts=FEELS.reduce((a,f)=>({...a,[f]:feels.filter(x=>x===f).length}),{});
      const wts=[...new Set(ex.sets.map(s=>s.weight).filter(Boolean))];
      return `<div style="margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:5px;">
          <span style="font-size:10px;font-weight:700;color:${AREA_COLOR[ex.area]||"var(--sub)"};background:${AREA_COLOR[ex.area]||"var(--sub)"}18;padding:2px 7px;border-radius:5px;margin-right:6px;">${ex.area}</span>
          ${ex.name}${wts.length?`<span style="color:var(--sub);font-weight:500;"> · ${wts.join("/")} kg</span>`:""}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${FEELS.map(f=>counts[f]>0?`<span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${FEEL_COLOR[f]}18;color:${FEEL_COLOR[f]};border:1px solid ${FEEL_COLOR[f]}33;">${f} ×${counts[f]}</span>`:"").join("")}
          ${feels.length===0?`<span style="font-size:12px;color:var(--faint);">No feel logged</span>`:""}
        </div>
      </div>`;
    }).join(""):`<div style="font-size:13px;color:var(--faint);">No workout saved for this date</div>`}
  </div>

  <!-- Note -->
  <div style="margin-bottom:12px;">
    <div class="sec-head">Day Note</div>
    <textarea id="p-no" placeholder="How did you feel today?" rows="2"
      style="width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--txt);padding:12px;font-size:14px;resize:none;outline:none;">${p.note||""}</textarea>
  </div>

  <button id="p-save" onclick="pSave()" class="btn-full btn-acc" style="margin-bottom:16px;">Save Progress</button>

  <!-- History -->
  ${hist.length?`
  <div class="sec-head" style="margin-top:4px;">History</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
    ${hist.map(d=>{
      const e=S.progress[d],ns=S.sessions[d],nn=S.nutrition[d];
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:14px;font-weight:700;color:var(--txt);">${fmtLong(d)}</span>
          ${ns?`<span class="badge" style="background:var(--acc-soft);color:var(--acc);">Workout ${ns.workoutType}</span>`:""}
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:${e.note?10:0}px;">
          ${e.weight?`<div><div style="font-size:18px;font-weight:800;color:var(--acc);">${e.weight}</div><div style="font-size:10px;color:var(--sub);">kg</div></div>`:""}
          ${e.sleep?`<div><div style="font-size:18px;font-weight:800;color:var(--pur);">${e.sleep}</div><div style="font-size:10px;color:var(--sub);">hrs sleep</div></div>`:""}
          ${e.water?`<div><div style="font-size:18px;font-weight:800;color:var(--blu);">${e.water}</div><div style="font-size:10px;color:var(--sub);">ml water</div></div>`:""}
          ${e.steps?`<div><div style="font-size:18px;font-weight:800;color:var(--grn);">${e.steps}</div><div style="font-size:10px;color:var(--sub);">steps</div></div>`:""}
          ${nn?`<div><div style="font-size:18px;font-weight:800;color:var(--acc);">${Math.round(nn.totals.calories)}</div><div style="font-size:10px;color:var(--sub);">kcal</div></div>`:""}
        </div>
        ${e.note?`<div style="font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:8px;">📝 ${e.note}</div>`:""}
      </div>`;
    }).join("")}
  </div>`:""}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  lsLoad();
  render();
  try {
    await sbInit();
    if (!_userId) return;
    await sbLoad();
    render();
    S.syncStatus="synced";
    renderSyncBadge();
  } catch(e) {
    console.warn("Cloud sync unavailable:", e);
  }
}

init();
</script>
</body>
</html>
