<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chris Body OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #dde3ea;
  --txt: #1a2535;
  --sub: #7a8a9a;
  --faint: #aab4c0;
  --acc: #185FA5;
  --acc-soft: #eef3fa;
  --acc-dark: #0C447C;
  --grn: #34c759;
  --grn-soft: #e9f9ee;
  --blu: #007aff;
  --blu-soft: #e5f1ff;
  --pur: #af52de;
  --pur-soft: #f5eafd;
  --yel: #ff9f0a;
  --red: #ff3b30;
  --orange: #ff6b35;
  color-scheme: light;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }
input, select, textarea, button { font-family: inherit; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.4; }
button { -webkit-appearance: none; cursor: pointer; }

/* ── MOBILE layout (default) ── */
body { padding-bottom: 90px; }
#app { width: 100%; }
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 max(16px, env(safe-area-inset-bottom));
  z-index: 90;
}
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; padding: 4px 0; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: .02em; }

/* ── DESKTOP layout (≥ 640px) ── */
@media (min-width: 640px) {
  body { padding-bottom: 0; display: flex; }
  #nav {
    position: fixed; top: 0; left: 0; bottom: 0; right: auto; width: 200px;
    flex-direction: column; justify-content: flex-start; align-items: stretch;
    border-top: none; border-right: 1px solid var(--border);
    padding: 24px 0 24px;
    background: var(--card);
    backdrop-filter: none; -webkit-backdrop-filter: none;
  }
  #nav .nav-brand {
    padding: 0 20px 20px; font-size: 16px; font-weight: 800; color: var(--txt);
    border-bottom: 1px solid var(--border); margin-bottom: 10px;
  }
  .nav-btn { flex: none; flex-direction: row; justify-content: flex-start; align-items: center; gap: 10px; padding: 11px 20px; border-radius: 0; }
  .nav-btn:hover { background: var(--bg); }
  .nav-btn.active { background: var(--acc-soft); }
  .nav-icon { font-size: 18px; }
  .nav-label { font-size: 13px; font-weight: 600; letter-spacing: 0; }
  #app { margin-left: 200px; max-width: 720px; padding: 0 24px; }
}

/* CARDS */
.card { background: var(--card); border-radius: 12px; border: 0.5px solid var(--border); overflow: hidden; }
.card-pad { padding: 14px; }

/* INPUTS */
.inp { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--txt); font-size: 15px; font-weight: 500; padding: 10px 12px; outline: none; transition: border-color .15s; width: 100%; }
.inp:focus { border-color: var(--acc); }

/* BUTTONS */
.btn-full { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; letter-spacing: .02em; transition: opacity .15s, transform .1s; }
.btn-full:active { transform: scale(.99); opacity: .9; }
.btn-acc { background: var(--acc); color: #fff; }
.btn-grn { background: var(--grn); color: #fff; }

/* SECTION HEADER */
.sec-head { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }

/* SET ROW */
.set-row { display: grid; grid-template-columns: 30px 1fr 1fr 2fr 1fr; gap: 3px; align-items: center; padding: 5px 8px; border-radius: 8px; }

/* CELL INPUT */
.cell-inp { border: 0.5px solid var(--border); border-radius: 6px; background: var(--card); color: var(--txt); font-size: 13px; font-weight: 500; padding: 6px 3px; text-align: center; outline: none; width: 100%; }
.cell-inp:focus { border-color: var(--acc); }
.cell-inp::placeholder { color: var(--faint); }

/* REST CELL */
.rest-cell { border-radius: 6px; padding: 6px 3px; text-align: center; font-size: 11px; font-weight: 600; border: 0.5px solid var(--border); background: var(--bg); color: var(--faint); }

/* FEEL WRAPPER */
.feel-wrap { position: relative; }
.feel-wrap select { width: 100%; border-radius: 6px; padding: 6px 16px 6px 7px; font-size: 11px; font-weight: 600; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; border-width: 0.5px; border-style: solid; }
.feel-wrap::after { content: "▾"; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 9px; }
</style>
</head>

// ── STATE ──────────────────────────────────────────────────────────────────
const today = new Date().toISOString().slice(0,10);
function nearestSession() { return SESSIONS.find(d=>d>=today)||SESSIONS[SESSIONS.length-1]; }
function getType(d) { const i=SESSIONS.indexOf(d); return i<0?null:i%2===0?"A":"B"; }
function mkSets(n) { return Array.from({length:n},(_,i)=>({set:i+1,reps:"",weight:"",feel:"",rest:""})); }

          {name:"Lunch",calories:"",protein:"",carbs:"",fat:""},

}

let S = {
  tab:"workout", height:"172", weight:"—",
  feelPicker:null,
  wDate:nearestSession(), wManual:null, wSel:{}, wOrder:{},
  wNums:{0:"1",1:"2",2:"3",3:"4"},
  wSets:{
    "2026-06-29_0":[{set:1,reps:"",weight:"15",feel:"Easy",rest:60},{set:2,reps:"5",weight:"15",feel:"Easy",rest:60},{set:3,reps:"5",weight:"15",feel:"Easy",rest:60},{set:4,reps:"5",weight:"20",feel:"Med",rest:90},{set:5,reps:"5",weight:"20",feel:"Med",rest:90}],
    "2026-06-29_1":[{set:1,reps:"5",weight:"21",feel:"Easy",rest:60},{set:2,reps:"5",weight:"21",feel:"Easy",rest:60},{set:3,reps:"5",weight:"28",feel:"Easy",rest:60},{set:4,reps:"5",weight:"28",feel:"Easy",rest:60},{set:5,reps:"5",weight:"28",feel:"Easy",rest:60}],
    "2026-06-29_2":[{set:1,reps:"5",weight:"21",feel:"Easy",rest:60},{set:2,reps:"5",weight:"21",feel:"Easy",rest:60},{set:3,reps:"5",weight:"21",feel:"Easy",rest:60},{set:4,reps:"5",weight:"28",feel:"Med",rest:90},{set:5,reps:"5",weight:"28",feel:"Med",rest:90}],
    "2026-06-29_3":[{set:1,reps:"5",weight:"15",feel:"Easy",rest:60},{set:2,reps:"5",weight:"15",feel:"Easy",rest:60},{set:3,reps:"5",weight:"15",feel:"Easy",rest:60},{set:4,reps:"5",weight:"20",feel:"Med",rest:90},{set:5,reps:"5",weight:"20",feel:"Med",rest:90}]
  },
  nDate:today, nMeals:defaultMeals(), pDate:today,
  sessions:{
    "2026-06-29":{date:"2026-06-29",workoutType:"A",exercises:[
      {area:"Chest",name:"Flat DB Bench Press",sets:[{set:1,reps:"",weight:"15",feel:"Easy",rest:60},{set:2,reps:"5",weight:"15",feel:"Easy",rest:60},{set:3,reps:"5",weight:"15",feel:"Easy",rest:60},{set:4,reps:"5",weight:"20",feel:"Med",rest:90},{set:5,reps:"5",weight:"20",feel:"Med",rest:90}]},
      {area:"Back Pull",name:"Wide Grip Lat Pulldown",sets:[{set:1,reps:"5",weight:"21",feel:"Easy",rest:60},{set:2,reps:"5",weight:"21",feel:"Easy",rest:60},{set:3,reps:"5",weight:"28",feel:"Easy",rest:60},{set:4,reps:"5",weight:"28",feel:"Easy",rest:60},{set:5,reps:"5",weight:"28",feel:"Easy",rest:60}]},
      {area:"Back Row",name:"Seated Cable Row",sets:[{set:1,reps:"5",weight:"21",feel:"Easy",rest:60},{set:2,reps:"5",weight:"21",feel:"Easy",rest:60},{set:3,reps:"5",weight:"21",feel:"Easy",rest:60},{set:4,reps:"5",weight:"28",feel:"Med",rest:90},{set:5,reps:"5",weight:"28",feel:"Med",rest:90}]},
      {area:"Legs",name:"DB Romanian Deadlift",sets:[{set:1,reps:"5",weight:"15",feel:"Easy",rest:60},{set:2,reps:"5",weight:"15",feel:"Easy",rest:60},{set:3,reps:"5",weight:"15",feel:"Easy",rest:60},{set:4,reps:"5",weight:"20",feel:"Med",rest:90},{set:5,reps:"5",weight:"20",feel:"Med",rest:90}]}
    ]}
  },
  nutrition:{}, progress:{},
  timer:{visible:false,running:false,seconds:0,total:0,feel:""},
  syncStatus:"idle"
};

// ── TIMER ──────────────────────────────────────────────────────────────────
let timerIv = null;
let _timerStartAt = null;
let _timerDuration = 0;

function startRestTimer(feel) {
  const secs = FEEL_REST[feel] || 90;
  clearInterval(timerIv);
  _timerStartAt = Date.now();
  _timerDuration = secs;
  S.timer = {visible:true, running:true, seconds:secs, total:secs, feel};
  try { localStorage.setItem("bt_timer", JSON.stringify({startAt:_timerStartAt, duration:_timerDuration, feel})); } catch(e){}
  timerIv = setInterval(tickTimer, 500);
  renderTimerSection();
}

function tickTimer() {
  if (!_timerStartAt) return;
  const elapsed = Math.floor((Date.now() - _timerStartAt) / 1000);
  const remaining = Math.max(0, _timerDuration - elapsed);
  S.timer.seconds = remaining;
  if (remaining <= 0 && S.timer.running) {
    S.timer.running = false;
    clearInterval(timerIv);
    try { localStorage.removeItem("bt_timer"); } catch(e){}
    onTimerDone();
  }
  renderTimerSection();
}

function resumeTimerIfActive() {
  try {
    const saved = JSON.parse(localStorage.getItem("bt_timer") || "null");
    if (!saved) return;
    const elapsed = Math.floor((Date.now() - saved.startAt) / 1000);
    const remaining = saved.duration - elapsed;
    if (remaining > 0) {
      _timerStartAt = saved.startAt;
      _timerDuration = saved.duration;
      S.timer = {visible:true, running:true, seconds:remaining, total:saved.duration, feel:saved.feel};
      timerIv = setInterval(tickTimer, 500);
    } else {
      localStorage.removeItem("bt_timer");
    }
  } catch(e){}
}

document.addEventListener("visibilitychange", () => { if (!document.hidden && _timerStartAt) tickTimer(); });

function skipTimer() {
  clearInterval(timerIv);
  _timerStartAt = null;
  S.timer = {visible:false, running:false, seconds:0, total:0, feel:""};
  try { localStorage.removeItem("bt_timer"); } catch(e){}
  renderTimerSection();
}

function adjTimer(d) {
  if (!_timerStartAt) return;
  if (d > 0) {
    _timerDuration += d;
  } else {
    const elapsed = Math.floor((Date.now() - _timerStartAt) / 1000);
    _timerDuration = Math.max(elapsed + 10, _timerDuration + d);
  }
  S.timer.total = _timerDuration;
  tickTimer();
}

function onTimerDone() {
  if (navigator.vibrate) navigator.vibrate([200,100,200]);
  try {
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    [880,660].forEach((freq,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.type="sine"; o.frequency.value=freq;
      const t=ctx.currentTime+i*.45;
      g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.4);
      o.start(t); o.stop(t+.4);
    });
  } catch(e){}
}

function fmtTime(s) { return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0"); }

function renderTimerSection() {
  const el = document.getElementById("timer-section");
  if (!el) return;
  const {visible, running, seconds, total, feel} = S.timer;
  if (!visible) { el.innerHTML = ""; return; }
  const fc = FEEL_COLOR[feel] || "var(--acc)";
  const done = !running && total > 0 && seconds <= 0;
  const pct = total > 0 ? (seconds / total * 100) : 0;
  const urgent = running && seconds <= 10;
  el.innerHTML = `
  <div class="card" style="margin-bottom:10px;border-color:${done?"var(--grn)":fc};">
    <div style="padding:12px 14px 10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div>
          <div style="font-size:10px;font-weight:700;color:${done?"var(--grn)":fc};text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">${done?"Rest Done ✓":feel+" · Resting"}</div>
          <div style="font-size:28px;font-weight:700;color:${done?"var(--grn)":urgent?"var(--red)":"var(--txt)"};line-height:1;">${done?"Done!":fmtTime(seconds)}</div>
        </div>
        <button onclick="skipTimer()" style="background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--sub);margin-top:2px;">Dismiss</button>
      </div>
      <div style="background:var(--border);border-radius:999px;height:4px;overflow:hidden;margin-bottom:8px;">
        <div style="width:${100-pct}%;height:100%;background:${done?"var(--grn)":urgent?"var(--red)":fc};border-radius:999px;transition:width .5s linear;"></div>
      </div>
      <div style="display:flex;gap:5px;">
        <button onclick="adjTimer(-30)" style="flex:1;padding:7px 0;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);color:${running?"var(--txt)":"var(--faint)"};font-size:12px;font-weight:600;">−30s</button>
        <button onclick="adjTimer(30)"  style="flex:1;padding:7px 0;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);color:${running?"var(--txt)":"var(--faint)"};font-size:12px;font-weight:600;">+30s</button>
      </div>
    </div>
  </div>`;
}

// ── SUPABASE ───────────────────────────────────────────────────────────────
let _sb = null, _userId = null, _userEmail = "", _userInitials = "?";

function toggleProfileMenu() {
  const m = document.getElementById("profile-menu");
  if (m) m.style.display = m.style.display === "none" ? "block" : "none";
}
document.addEventListener("click", e => {
  const m = document.getElementById("profile-menu");
  const av = document.getElementById("avatar-btn");
  if (m && m.style.display !== "none" && !m.contains(e.target) && e.target !== av) {
    m.style.display = "none";
  }
});

async function doSignOut() {
  if (_sb) await _sb.auth.signOut();
  _userId = null; _userEmail = ""; _userInitials = "?";
  render(); renderSyncBadge();
}

function sbReady() { return _sb && _userId; }

async function sbInit() {
  try {
    _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    if (location.hash.includes("access_token")) {
      await _sb.auth.exchangeCodeForSession(location.hash);
      history.replaceState(null,"",location.pathname);
    }
    const {data:{session}} = await _sb.auth.getSession();
    if (session && !session.user.is_anonymous) {
      _userId = session.user.id;
      _userEmail = session.user.email || "";
      _userInitials = _userEmail ? _userEmail.slice(0,2).toUpperCase() : "?";
    }
  } catch(e) { console.warn("Supabase init failed:",e); }
}

async function sbLoad() {
  if (!sbReady()) return;
  try {
    const {data,error} = await _sb.from("user_data").select("*").eq("id",_userId).maybeSingle();
    if (error) throw error;
    if (data) {
      S.sessions  = Object.assign({},S.sessions,  data.sessions||{});
      S.nutrition = Object.assign({},S.nutrition, data.nutrition||{});
      S.progress  = Object.assign({},S.progress,  data.progress||{});
      S.wSets     = Object.assign({},S.wSets,     data.w_sets||{});
      if (data.height) S.height = data.height;
      if (data.weight) S.weight = data.weight;
      if (data.w_nums) S.wNums  = data.w_nums;
    }
  } catch(e) { console.warn("Supabase load failed:",e); }
}

async function sbSave() {
  if (!sbReady()) return;
  S.syncStatus = "syncing"; renderSyncBadge();
  try {
    const {error} = await _sb.from("user_data").upsert({
      id:_userId, sessions:S.sessions, nutrition:S.nutrition,
      progress:S.progress, w_sets:S.wSets,
      height:S.height, weight:S.weight, w_nums:S.wNums
    });
    if (error) throw error;
    S.syncStatus = "synced";
  } catch(e) { console.warn("Supabase save:",e); S.syncStatus = "error"; }
  renderSyncBadge();
}

function renderSyncBadge() {
  const map = {idle:"",syncing:"↑",synced:"✓",error:"⚠"};
  const col = {idle:"",syncing:"#ff9f0a",synced:"#34c759",error:"#ff3b30"};
  const el = document.getElementById("w-saved-badge");
  if (el && _userId) {
    const t = map[S.syncStatus]||"";
    if (t) { el.style.display=""; el.textContent = t+" synced"; el.style.color = col[S.syncStatus]; }
  }
}

// ── LOCAL STORAGE ──────────────────────────────────────────────────────────
const LS = "bulktracker_v3";
function lsSave() {
  try {
    localStorage.setItem(LS, JSON.stringify({
      sessions:S.sessions, nutrition:S.nutrition, progress:S.progress,
      wSets:S.wSets, wOrder:S.wOrder, wSel:S.wSel,
      height:S.height, weight:S.weight, wNums:S.wNums
    }));
  } catch(e){}
  sbSave();
}
function lsLoad() {
  try {
    const d = JSON.parse(localStorage.getItem(LS)||"null"); if (!d) return;
    S.sessions  = Object.assign({},S.sessions,  d.sessions||{});
    S.nutrition = Object.assign({},S.nutrition, d.nutrition||{});
    S.progress  = Object.assign({},S.progress,  d.progress||{});
    S.wSets     = Object.assign({},S.wSets,     d.wSets||{});
    S.wOrder    = Object.assign({},S.wOrder,    d.wOrder||{});
    S.wSel      = Object.assign({},S.wSel,      d.wSel||{});
    if (d.height) S.height = d.height;
    if (d.weight) S.weight = d.weight;
    if (d.wNums)  S.wNums  = d.wNums;
  } catch(e){}
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmtLong(d)  { return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}); }
function dayAbbr(d)  { return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short"}); }
function fmtRest(s)  { if (!s) return "—"; return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0"); }
function getWType()  { return S.wManual||getType(S.wDate)||"A"; }
function getSlots()  { return SLOTS[getWType()]; }
function getEx(si)   { const sl=getSlots()[si]; return sl.options[Math.min(S.wSel[si]??0,sl.options.length-1)]; }
function getSets(si) { return S.wSets[S.wDate+"_"+si]||mkSets(getSlots()[si].sets); }
function getOrder()  {
  const t = getWType();
  if (!S.wOrder[t] || S.wOrder[t].length !== getSlots().length)
    S.wOrder[t] = getSlots().map((_,i)=>i);
  return S.wOrder[t];
}

          Create account
        </button>
      </div>
      <div style="margin-bottom:10px;">
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">Email</div>
        <input id="login-email" type="email" placeholder="your@email.com" autocomplete="email"
          class="inp" style="font-size:15px;padding:13px 14px;width:100%;"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()"/>
      </div>
      <div style="margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">Password</div>
        <input id="login-pw" type="password" placeholder="••••••••" autocomplete="${_loginMode==='signin'?'current-password':'new-password'}"
          class="inp" style="font-size:15px;padding:13px 14px;width:100%;"
          onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button onclick="doLogin()" class="btn-full btn-acc" id="login-btn" style="font-size:15px;padding:14px;">
        ${_loginMode==='signin'?'Sign in':'Create account'}
      </button>
      <div id="login-msg" style="margin-top:14px;font-size:13px;color:var(--sub);text-align:center;line-height:1.5;min-height:20px;"></div>
    </div>
  </div>`;
}

function setLoginMode(mode) {
  _loginMode = mode;
  showLoginScreen();
  setTimeout(()=>{ document.getElementById('login-email')?.focus(); },50);
}

async function doLogin() {
  const email = document.getElementById("login-email")?.value?.trim();
  const pw    = document.getElementById("login-pw")?.value;
  const msg = document.getElementById("login-msg");
  if (!email || !pw) { msg.innerHTML = `<span style="color:var(--red);">Please enter email and password.</span>`; return; }
  if (!_sb) {
    try { await sbInit(); } catch(e) {}
    if (!_sb) { msg.innerHTML = `<span style="color:var(--red);">Connection failed. Check your internet and try again.</span>`; return; }
  }
  const btn = document.getElementById("login-btn");
  btn.textContent = _loginMode==="signin" ? "Signing in…" : "Creating account…";
  btn.disabled = true; btn.style.opacity = ".7";

  let error;
  if (_loginMode === "signin") {
    const res = await _sb.auth.signInWithPassword({email, password:pw});
    error = res.error;
    if (!error) {
      _userId = res.data.session.user.id;
      _userEmail = res.data.session.user.email || "";
      _userInitials = _userEmail.slice(0,2).toUpperCase();
    }
  } else {
    const res = await _sb.auth.signUp({email, password:pw});
    error = res.error;
    if (!error && res.data.session) {
      _userId = res.data.session.user.id;
      _userEmail = res.data.session.user.email || "";
      _userInitials = _userEmail.slice(0,2).toUpperCase();
    } else if (!error) {
      msg.innerHTML = `<span style="color:var(--grn);">✓ Check your email to confirm your account.</span>`;
      btn.textContent = "Create account"; btn.disabled = false; btn.style.opacity = "1";
      return;
    }
  }

  if (error) {
    msg.innerHTML = `<span style="color:var(--red);">${error.message}</span>`;
    btn.textContent = _loginMode==="signin"?"Sign in":"Create account";
    btn.disabled = false; btn.style.opacity = "1";
  } else {
    await sbSave();
    await sbLoad();
    render(); renderNav();
  }
}

// ── NAV ────────────────────────────────────────────────────────────────────
function renderNav() {
  const tabs = [["workout","🏋️","Workout"],["nutrition","🥗","Nutrition"],["progress","📈","Progress"]];
  const el = document.getElementById("nav");
  el.style.display = "flex";
  const isDesktop = window.innerWidth >= 640;
  el.innerHTML = (isDesktop ? `<div class="nav-brand">🏋️ Chris Body OS</div>` : "") +
    tabs.map(([t,icon,label])=>`
    <button class="nav-btn${S.tab===t?" active":""}" onclick="S.tab='${t}';render();">
      <span class="nav-icon">${icon}</span>
      <span class="nav-label" style="color:${S.tab===t?"var(--acc)":"var(--faint)"};">${label}</span>
    </button>`).join("");
}

// ── WORKOUT ACTIONS ────────────────────────────────────────────────────────
function wDate(d)   { S.wDate=d; S.wManual=null; render(); }
function wManual(t) { S.wManual=(S.wManual===t?null:t); render(); }
function wEx(si,oi) { S.wSel[si]=oi; S.wSets[S.wDate+"_"+si]=mkSets(getSlots()[si].sets); renderCards(); }

function wMoveBlock(dispIdx, dir) {
  const t = getWType();
  const order = S.wOrder[t] = getOrder().slice();
  const j = dispIdx + dir;
  if (j<0||j>=order.length) return;
  [order[dispIdx], order[j]] = [order[j], order[dispIdx]];
  S.wOrder[t] = order;
  renderCards();
}

function openFeelPicker(si, idx) {
  S.feelPicker = (S.feelPicker && S.feelPicker.si===si && S.feelPicker.idx===idx) ? null : {si, idx};
  renderCards();
}

function wSet(si, idx, field, val) {
  const key = S.wDate+"_"+si;
  if (!S.wSets[key]) S.wSets[key] = mkSets(getSlots()[si].sets);
  S.wSets[key][idx][field] = val;
  if (field === "feel" && val) {
    S.wSets[key][idx].rest = FEEL_REST[val] || 90;
    S.feelPicker = null;
    startRestTimer(val);
  }
  renderCards();
  updateWProgress();
}

function wSave() {
  const slots = getSlots(), order = getOrder();
  S.sessions[S.wDate] = {
    date:S.wDate, workoutType:getWType(),
    exercises: order.map(si=>({area:slots[si].area, name:getEx(si).name, sets:getSets(si)}))
  };
  lsSave();
  const btn = document.getElementById("w-save");
  if (btn) {
    btn.textContent="✓ Session Saved"; btn.classList.replace("btn-acc","btn-grn");
    setTimeout(()=>{btn.textContent="Save Session";btn.classList.replace("btn-grn","btn-acc");},2500);
  }
  const badge = document.getElementById("w-saved-badge");
  if (badge) { badge.style.display="inline-flex"; }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  try {
    const sy = window.scrollY;
    document.getElementById("app").innerHTML =
      renderTopBar()+
      `<div style="padding:12px 12px 0;">`+
      (S.tab==="workout"   ? renderWorkoutTab()   : "")+
      (S.tab==="nutrition" ? renderNutritionTab() : "")+
      (S.tab==="progress"  ? renderProgressTab()  : "")+
      `</div>`;
    renderNav();
    window.scrollTo(0,sy);
    renderSyncBadge();
    if (S.tab==="workout") renderTimerSection();
  } catch(e) {
    document.getElementById("app").innerHTML =
      `<div style="padding:32px 20px;font-family:monospace;font-size:13px;color:#ff3b30;background:#fff;min-height:100vh;">
        <strong>Render error — screenshot this and send to Claude:</strong><br/><br/>
        ${String(e).replace(/</g,"&lt;")}
        <br/><br/>
        ${(e.stack||"").replace(/</g,"&lt;").replace(/\n/g,"<br/>")}
      </div>`;
    console.error("Render error:", e);
  }
}

      <div style="width:34px;height:34px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">${_userInitials}</div>
      <div style="overflow:hidden;">
        <div style="font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${_userEmail}</div>

function renderCards_() {
  const order = getOrder();
  const slots = getSlots();
  return order.map((si, dispIdx) => {
    const slot = slots[si];
    const oi = S.wSel[si]??0;
    const sets = getSets(si);
    const ac = "var(--acc)";
    const allDone = sets.length > 0 && sets.every(s=>s.feel);
    const doneCnt = sets.filter(s=>s.feel).length;

    return `
    <div class="card">
      <!-- Block header -->
      <div style="padding:9px 10px 8px;border-bottom:0.5px solid var(--border);">
        <!-- Row 1: move buttons + area label centered + done indicator -->
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px;">
          <div style="display:flex;flex-direction:column;flex-shrink:0;">
            <button onclick="wMoveBlock(${dispIdx},-1)" style="background:none;border:none;padding:1px 4px;color:${dispIdx===0?"transparent":"var(--faint)"};font-size:11px;line-height:1;pointer-events:${dispIdx===0?"none":"auto"};">▲</button>
            <button onclick="wMoveBlock(${dispIdx},1)"  style="background:none;border:none;padding:1px 4px;color:${dispIdx===order.length-1?"transparent":"var(--faint)"};font-size:11px;line-height:1;pointer-events:${dispIdx===order.length-1?"none":"auto"};">▼</button>
          </div>
          <div style="flex:1;text-align:center;font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.09em;">${slot.area}</div>
          <div style="font-size:10px;font-weight:600;color:var(--faint);min-width:28px;text-align:right;">${doneCnt}/${sets.length}</div>
        </div>
        <!-- Exercise picker -->
        <div style="position:relative;">
          <select onchange="wEx(${si},parseInt(this.value))"
            style="width:100%;padding:8px 28px 8px 10px;border-radius:8px;border:0.5px solid ${oi===0?"var(--border)":ac+"66"};background:${oi===0?"var(--bg)":ac+"0f"};font-size:12px;font-weight:600;color:${oi===0?"var(--txt)":ac};outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;">
            ${slot.options.map((o,i)=>`<option value="${i}" ${oi===i?"selected":""}>${i===0?"★ ":"○ "}${o.name}</option>`).join("")}
          </select>
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:10px;color:var(--faint);">▾</span>
        </div>
      </div>

      <!-- Set table -->
      <div style="padding:6px 8px 10px;">
        <!-- Column headers -->
        <div style="display:grid;grid-template-columns:30px 1fr 1fr 2fr 1fr;gap:3px;padding:0 2px 4px;font-size:9px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;">
          <span></span>
          <span style="text-align:center;">Reps</span>
          <span style="text-align:center;">kg</span>
          <span style="text-align:center;">Feel</span>
          <span style="text-align:center;">Rest</span>
        </div>
        <!-- Rows -->
        <div style="display:flex;flex-direction:column;gap:3px;">
          ${sets.map((s,idx)=>{
            const fc = s.feel ? FEEL_COLOR[s.feel] : null;
            const pickerOpen = S.feelPicker && S.feelPicker.si===si && S.feelPicker.idx===idx;
            return `<div class="set-row" style="background:${fc?fc+"28":"transparent"};border:0.5px solid ${fc?fc+"55":"transparent"};">
              <span style="font-size:9px;font-weight:700;color:var(--faint);white-space:nowrap;">Set ${s.set}</span>
              <input type="number" value="${s.reps}" placeholder="—"
                onchange="wSet(${si},${idx},'reps',this.value)" class="cell-inp"/>
              <input type="number" value="${s.weight}" placeholder="—"
                onchange="wSet(${si},${idx},'weight',this.value)" class="cell-inp"/>
              <button onclick="openFeelPicker(${si},${idx})"
                style="border:1px solid ${fc?fc+"88":"var(--border)"};background:${fc?fc:"var(--bg)"};color:${fc?FEEL_TEXT[s.feel]:"var(--faint)"};border-radius:8px;padding:5px 6px;font-size:11px;font-weight:700;cursor:pointer;width:100%;text-align:center;">
                ${s.feel||"Feel"}
              </button>
              <div class="rest-cell" style="border-color:${s.rest&&fc?fc+"88":"var(--border)"};background:${s.rest&&fc?fc+"30":"var(--bg)"};color:${s.rest&&fc?FEEL_TEXT[s.feel]:"var(--faint)"};">
                ${s.rest ? fmtRest(s.rest) : "—"}

            ${pickerOpen?`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;margin:4px 0 6px;overflow:hidden;">
              <div style="padding:10px 12px 6px;font-size:12px;font-weight:700;color:var(--sub);">Set ${s.set} — how did it feel?</div>

                style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:${sel?fc2:"transparent"};border-top:1px solid var(--border);cursor:pointer;">

                </div>
                ${sel?`<div style="width:18px;height:18px;border-radius:50%;background:${ft2==='#ffffff'?'rgba(255,255,255,.3)':'rgba(0,0,0,.15)'};display:flex;align-items:center;justify-content:center;font-size:10px;color:${ft2};">✓</div>`:`<div style="width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);"></div>`}
              </div>`;}).join("")}
            </div>`:""}`;
          }).join("")}
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderCards() {
  const el = document.getElementById("w-cards");
  if (el) el.innerHTML = renderCards_();
}

function updateWProgress() {
  const slots = getSlots(); let tot=0, done=0;
  slots.forEach((_,i)=>{const s=getSets(i);tot+=s.length;done+=s.filter(x=>x.feel).length;});
  const pct = tot>0?Math.round(done/tot*100):0;
  const b = document.getElementById("w-pbar"); if(b) b.style.width=pct+"%";
  const c = document.getElementById("w-counter"); if(c) c.textContent=done+"/"+tot;
}

function nMeal(i,f,v){S.nMeals[i][f]=v;updateNutTotals();}
function nName(i,v){S.nMeals[i].name=v;}
function nAdd(){S.nMeals.push({name:"",calories:"",protein:"",carbs:"",fat:""});render();}
function nDel(i){S.nMeals.splice(i,1);render();}
function nSave() {
  const tot=S.nMeals.reduce((a,m)=>({calories:a.calories+(+m.calories||0),protein:a.protein+(+m.protein||0),carbs:a.carbs+(+m.carbs||0),fat:a.fat+(+m.fat||0)}),{calories:0,protein:0,carbs:0,fat:0});
  S.nutrition[S.nDate]={meals:JSON.parse(JSON.stringify(S.nMeals)),totals:tot};
  lsSave();
  const b=document.getElementById("n-save");
  if(b){b.textContent="✓ Day Saved";b.classList.replace("btn-acc","btn-grn");setTimeout(()=>{b.textContent="Save Day";b.classList.replace("btn-grn","btn-acc");},2500);}
}
function calcTot() {
  return S.nMeals.reduce((a,m)=>({calories:a.calories+(+m.calories||0),protein:a.protein+(+m.protein||0),carbs:a.carbs+(+m.carbs||0),fat:a.fat+(+m.fat||0)}),{calories:0,protein:0,carbs:0,fat:0});
}

function renderNutritionTab() {
  const tot=calcTot(), saved=S.nutrition[S.nDate];
  const macros=[
    {k:"calories",l:"Calories",u:"kcal",c:"var(--acc)",t:NUT_TARGET.calories},
    {k:"protein", l:"Protein", u:"g",   c:"var(--grn)",t:NUT_TARGET.protein},
    {k:"carbs",   l:"Carbs",   u:"g",   c:"var(--yel)",t:NUT_TARGET.carbs},
    {k:"fat",     l:"Fat",     u:"g",   c:"var(--pur)",t:NUT_TARGET.fat},
  ];
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <input type="date" value="${S.nDate}" onchange="nDate(this.value)"
      style="background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:14px;font-weight:600;padding:8px 12px;outline:none;flex:1;"/>
    ${saved?`<span class="badge" style="background:var(--grn-soft);color:var(--grn);">✓ Saved</span>`:""}
  </div>
  <div id="n-tots" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;">
    ${macros.map(m=>{
      const v=tot[m.k]||0,p=Math.min(Math.round(v/m.t*100),100);
      return `<div class="card card-pad">
        <div style="font-size:11px;font-weight:700;color:${m.c};margin-bottom:2px;letter-spacing:.04em;">${m.l.toUpperCase()}</div>
        <div style="font-size:24px;font-weight:800;color:${m.c};line-height:1;margin-bottom:8px;">${Math.round(v)}<span style="font-size:11px;font-weight:500;color:var(--sub);margin-left:2px;">${m.u}</span></div>
        <div style="background:var(--border);border-radius:999px;height:5px;overflow:hidden;margin-bottom:4px;">
          <div style="width:${p}%;height:100%;background:${m.c};border-radius:999px;"></div>
        </div>
        <div style="font-size:11px;color:var(--faint);">${p}% of ${m.t}</div>
      </div>`;
    }).join("")}
  </div>
  <div class="sec-head">Meals</div>
  <div style="display:flex;flex-direction:column;gap:10px;">
    ${S.nMeals.map((meal,i)=>`
    <div class="card">
      <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);">
        <input value="${meal.name}" placeholder="Meal ${i+1}" onchange="nName(${i},this.value)"
          style="background:transparent;border:none;outline:none;font-size:15px;font-weight:700;color:var(--txt);flex:1;"/>
        <button onclick="nDel(${i})" style="background:none;border:none;color:var(--faint);font-size:20px;line-height:1;padding:0 0 0 8px;">×</button>
      </div>
      <div style="padding:12px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        ${["calories","protein","carbs","fat"].map(f=>`
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;margin-bottom:5px;">${f.slice(0,4)}</div>
          <input type="number" value="${meal[f]}" placeholder="0" onchange="nMeal(${i},'${f}',this.value)"
            style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--txt);font-size:15px;font-weight:700;padding:8px 4px;text-align:center;outline:none;"/>
        </div>`).join("")}
      </div>
    </div>`).join("")}
  </div>
  <button onclick="nAdd()" style="margin-top:10px;width:100%;padding:12px;border-radius:12px;border:1.5px dashed var(--border);background:transparent;color:var(--sub);font-size:14px;font-weight:600;">+ Add Meal</button>
  <button id="n-save" onclick="nSave()" class="btn-full btn-acc" style="margin-top:10px;margin-bottom:16px;">Save Day</button>`;
}

function updateNutTotals() {
  const el = document.getElementById("n-tots"); if(!el) return;
  const tot = calcTot();
  const macros = [
    {k:"calories",l:"Calories",u:"kcal",c:"var(--acc)",t:NUT_TARGET.calories},
    {k:"protein", l:"Protein", u:"g",   c:"var(--grn)",t:NUT_TARGET.protein},
    {k:"carbs",   l:"Carbs",   u:"g",   c:"var(--yel)",t:NUT_TARGET.carbs},
    {k:"fat",     l:"Fat",     u:"g",   c:"var(--pur)",t:NUT_TARGET.fat},
  ];
  el.innerHTML = macros.map(m=>{
    const v=tot[m.k]||0,p=Math.min(Math.round(v/m.t*100),100);
    return `<div class="card card-pad">
      <div style="font-size:11px;font-weight:700;color:${m.c};margin-bottom:2px;letter-spacing:.04em;">${m.l.toUpperCase()}</div>
      <div style="font-size:24px;font-weight:800;color:${m.c};line-height:1;margin-bottom:8px;">${Math.round(v)}<span style="font-size:11px;font-weight:500;color:var(--sub);margin-left:2px;">${m.u}</span></div>
      <div style="background:var(--border);border-radius:999px;height:5px;overflow:hidden;margin-bottom:4px;">
        <div style="width:${p}%;height:100%;background:${m.c};border-radius:999px;"></div>
      </div>
      <div style="font-size:11px;color:var(--faint);">${p}% of ${m.t}</div>
    </div>`;
  }).join("");
}

// ── PROGRESS TAB ───────────────────────────────────────────────────────────
function pDate(d){S.pDate=d;render();}
function pSave() {
  S.progress[S.pDate]={
    weight:document.getElementById("p-w")?.value||"",
    sleep: document.getElementById("p-sl")?.value||"",
    water: document.getElementById("p-wa")?.value||"",
    steps: document.getElementById("p-st")?.value||"",
    note:  document.getElementById("p-no")?.value||""
  };
  lsSave();
  const b=document.getElementById("p-save");
  if(b){b.textContent="✓ Saved";b.classList.replace("btn-acc","btn-grn");setTimeout(()=>{b.textContent="Save Progress";b.classList.replace("btn-grn","btn-acc");},2500);}
}

function renderProgressTab() {
  const p=S.progress[S.pDate]||{}, nut=S.nutrition[S.pDate], ses=S.sessions[S.pDate];
  const hist=Object.keys(S.progress).sort((a,b)=>b.localeCompare(a));
  const metrics=[
    {id:"p-w", l:"Body Weight",v:p.weight||"",u:"kg",   c:"var(--acc)",ph:"61.5",icon:"⚖️"},
    {id:"p-sl",l:"Sleep",      v:p.sleep||"", u:"hrs",  c:"var(--pur)",ph:"7.5", icon:"😴"},
    {id:"p-wa",l:"Water",      v:p.water||"", u:"ml",   c:"var(--blu)",ph:"2000",icon:"💧"},
    {id:"p-st",l:"Steps",      v:p.steps||"", u:"steps",c:"var(--grn)",ph:"6000",icon:"👟"},
  ];
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <input type="date" value="${S.pDate}" onchange="pDate(this.value)"
      style="background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:14px;font-weight:600;padding:8px 12px;outline:none;flex:1;"/>
    ${S.progress[S.pDate]?`<span class="badge" style="background:var(--grn-soft);color:var(--grn);">✓ Saved</span>`:""}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
    ${metrics.map(f=>`
    <div class="card card-pad">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
        <span style="font-size:16px;">${f.icon}</span>
        <span style="font-size:11px;font-weight:700;color:${f.c};letter-spacing:.04em;">${f.l.toUpperCase()}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:5px;">
        <input id="${f.id}" type="number" value="${f.v}" placeholder="${f.ph}"
          style="flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:22px;font-weight:800;padding:8px 10px;outline:none;min-width:0;"/>
        <span style="font-size:11px;color:var(--sub);white-space:nowrap;">${f.u}</span>
      </div>
    </div>`).join("")}
  </div>
  <div class="card card-pad" style="margin-bottom:12px;">
    <div class="sec-head">Nutrition — From Log</div>
    ${nut?`<div style="display:flex;gap:16px;flex-wrap:wrap;">
      ${[["calories","kcal","var(--acc)"],["protein","g protein","var(--grn)"],["carbs","g carbs","var(--yel)"],["fat","g fat","var(--pur)"]].map(([k,u,c])=>`
      <div><div style="font-size:20px;font-weight:800;color:${c};">${Math.round(nut.totals[k])}</div><div style="font-size:11px;color:var(--sub);">${u}</div></div>`).join("")}
    </div>`:`<div style="font-size:13px;color:var(--faint);">No nutrition logged for this day</div>`}
  </div>
  <div class="card card-pad" style="margin-bottom:12px;">
    <div class="sec-head">Workout Feel</div>
    ${ses?ses.exercises.map(ex=>{
      const feels=ex.sets.map(s=>s.feel).filter(Boolean);
      const counts=FEELS.reduce((a,f)=>({...a,[f]:feels.filter(x=>x===f).length}),{});
      const wts=[...new Set(ex.sets.map(s=>s.weight).filter(Boolean))];
      return `<div style="margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:5px;">
          <span style="font-size:10px;font-weight:700;color:${AREA_COLOR[ex.area]||"var(--sub)"};background:${AREA_COLOR[ex.area]||"var(--sub)"}18;padding:2px 7px;border-radius:5px;margin-right:6px;">${ex.area}</span>
          ${ex.name}${wts.length?`<span style="color:var(--sub);font-weight:500;"> · ${wts.join("/")} kg</span>`:""}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${FEELS.map(f=>counts[f]>0?`<span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${FEEL_COLOR[f]}18;color:${FEEL_COLOR[f]};border:1px solid ${FEEL_COLOR[f]}33;">${f} ×${counts[f]}</span>`:"").join("")}
          ${feels.length===0?`<span style="font-size:12px;color:var(--faint);">No feel logged</span>`:""}
        </div>
      </div>`;
    }).join(""):`<div style="font-size:13px;color:var(--faint);">No workout saved for this date</div>`}
  </div>
  <div style="margin-bottom:12px;">
    <div class="sec-head">Day Note</div>
    <textarea id="p-no" placeholder="How did you feel today?" rows="2"
      style="width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--txt);padding:12px;font-size:14px;resize:none;outline:none;">${p.note||""}</textarea>
  </div>
  <button id="p-save" onclick="pSave()" class="btn-full btn-acc" style="margin-bottom:16px;">Save Progress</button>
  ${hist.length?`
  <div class="sec-head" style="margin-top:4px;">History</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
    ${hist.map(d=>{
      const e=S.progress[d],ns=S.sessions[d],nn=S.nutrition[d];
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:14px;font-weight:700;color:var(--txt);">${fmtLong(d)}</span>
          ${ns?`<span class="badge" style="background:var(--acc-soft);color:var(--acc);">Workout ${ns.workoutType}</span>`:""}
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:${e.note?10:0}px;">
          ${e.weight?`<div><div style="font-size:18px;font-weight:800;color:var(--acc);">${e.weight}</div><div style="font-size:10px;color:var(--sub);">kg</div></div>`:""}
          ${e.sleep?`<div><div style="font-size:18px;font-weight:800;color:var(--pur);">${e.sleep}</div><div style="font-size:10px;color:var(--sub);">hrs sleep</div></div>`:""}
          ${e.water?`<div><div style="font-size:18px;font-weight:800;color:var(--blu);">${e.water}</div><div style="font-size:10px;color:var(--sub);">ml water</div></div>`:""}
          ${e.steps?`<div><div style="font-size:18px;font-weight:800;color:var(--grn);">${e.steps}</div><div style="font-size:10px;color:var(--sub);">steps</div></div>`:""}
          ${nn?`<div><div style="font-size:18px;font-weight:800;color:var(--acc);">${Math.round(nn.totals.calories)}</div><div style="font-size:10px;color:var(--sub);">kcal</div></div>`:""}
        </div>
        ${e.note?`<div style="font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:8px;">📝 ${e.note}</div>`:""}
      </div>`;
    }).join("")}
  </div>`:""}`
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  lsLoad();
  resumeTimerIfActive();
  try {
    await sbInit();
    if (_userId) {
      await sbLoad();
      render(); renderNav();
      S.syncStatus = "synced";
      renderSyncBadge();
    } else {
      showLoginScreen();
    }
  } catch(e) {
    console.warn("Supabase unavailable:", e);
    showLoginScreen();
  }
}

init();
window.addEventListener("resize", () => { if (document.getElementById("nav").style.display !== "none") renderNav(); });
</script>
</body>
</html>
